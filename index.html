<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridStream | F1 Live Streams</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- HLS.js library for streaming M3U8 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Shaka Player library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <!-- mpegts.js for MPEG-TS streams -->
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
</head>
<body>
    <!-- Premium Header -->
    <header class="app-header">
        <div class="header-logo">
            <i class="fa-solid fa-flag-checkered header-icon"></i>
            <div>
                <h1>Grid<span>Stream</span></h1>
                <p>Formula 1 Dedicated Portal</p>
            </div>
        </div>

        <div class="header-controls">
            <div class="live-status">
                <span class="pulse-dot"></span>
                <span class="live-label">RACE BROADCAST</span>
            </div>
            
            <!-- Toggle Sidebar Button -->
            <button id="btn-toggle-sidebar" class="settings-btn active" title="Toggle Sidebar">
                <i class="fa-solid fa-table-columns"></i> <span>Sidebar</span>
            </button>

            <!-- Upload Page Redirect (Hidden by default, accessible at /add) -->
            <a href="/add" class="settings-btn upload-btn-link hidden" title="Upload Playlist">
                <i class="fa-solid fa-cloud-arrow-up"></i> <span>Upload M3U</span>
            </a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Viewing Area (Stream Window Only) -->
        <div class="viewing-area">
            <div id="player-grid" class="player-grid single-layout">
                <div id="container-ch1" class="player-container active">
                    <div class="player-header">
                        <div class="player-channel-info">
                            <span class="badge ch1-badge">LIVE TRACK</span>
                            <span id="label-ch1-title" class="stream-title">Select a Stream from Sidebar</span>
                        </div>
                        <div class="player-actions">
                            <span id="stat-resolution" class="stat-res-badge">No Stream</span>
                            <button class="player-action-btn fullscreen-btn" data-target="video-ch1" title="Fullscreen">
                                <i class="fa-solid fa-expand"></i>
                            </button>
                        </div>
                    </div>
                    <div class="video-wrapper">
                        <video id="video-ch1" autoplay playsinline controls muted></video>
                        <iframe id="iframe-player" class="hidden" style="width:100%; height:100%; border:none; background: #000;" allowfullscreen allow="autoplay; encrypted-media"></iframe>
                        <div id="ch1-spinner" class="spinner-overlay hidden">
                            <div class="spinner"></div>
                        </div>
                        <div id="ch1-error-overlay" class="error-overlay hidden">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <p>Stream loading failed or stalled. Please select another source.</p>
                        </div>
                    </div>
                </div>
            </div>            
        </div>

        <!-- Collapsible Sidebar -->
        <aside id="app-sidebar" class="sidebar">
            <div id="channel-picker-card" class="sidebar-card" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                <h3><i class="fa-solid fa-list"></i> Channels</h3>
                <div id="playlist-tabs" class="playlist-tabs"></div>
                <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
                    <input type="text" id="channel-search" placeholder="Search streams..." style="flex:1;margin-bottom:0;">
                    <button id="btn-sort-quality" class="settings-btn" title="Sort by stream latency" style="flex-shrink:0;padding:6px 10px;font-size:0.7rem;">
                        <i class="fa-solid fa-signal"></i>
                    </button>
                </div>
                <div id="m3u-channel-list" class="channel-options" style="flex: 1; overflow-y: auto;">
                    <!-- Dynamically populated from JS -->
                </div>
            </div>
        </aside>
    </main>

    <!-- Core App JS -->
    <script src="app.js"></script>
</body>
</html>
